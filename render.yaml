services:
  - type: web
    name: fresh-bloom
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: fresh-bloom-db
          property: connectionString
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: ENABLE_ENV_DEBUG
        sync: false
      - key: BUSINESS_WHATSAPP_NUMBER
        sync: false
      - key: BUSINESS_WHATSAPP_URL
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_GRAPH_API_VERSION
        sync: false
      - key: WHATSAPP_DEFAULT_COUNTRY_CODE
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        sync: false
      - key: WHATSAPP_CONFIRMATION_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_CONFIRMATION_TEMPLATE_LANGUAGE
        sync: false
      - key: WHATSAPP_PROMOTION_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_PROMOTION_TEMPLATE_LANGUAGE
        sync: false
      - key: WHATSAPP_PROMOTION_API_SECRET
        sync: false

databases:
  - name: fresh-bloom-db
    plan: free
    databaseName: fresh_bloom
    user: fresh_bloom_user
